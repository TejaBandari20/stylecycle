<!DOCTYPE html>
<html>
<head>
    <title>User Home</title>
</head>

<body>

<h2>Welcome to Home Page</h2>

<p id="welcomeUser"></p>

<button onclick="logout()">Logout</button>

<hr>

<h3>Available Donations</h3>

<div id="donationsList"></div>

<script>
const API_BASE_URL = "http://51.20.181.96:5000";

// 🚫 Protect page (must login)
if (!localStorage.getItem("userId")) {
    alert("Please login first ❌");
    window.location.href = "/Login";
}

// ✅ Show username
document.getElementById("welcomeUser").innerText =
    "Hello, " + localStorage.getItem("username");

// ================= LOAD POSTS =================
async function loadPosts() {
    const res = await fetch(`${API_BASE_URL}/api/posts`);
    const posts = await res.json();

    const container = document.getElementById("donationsList");
    container.innerHTML = "";

    posts.forEach(post => {
        const div = document.createElement("div");

        div.style.border = "1px solid black";
        div.style.padding = "10px";
        div.style.margin = "10px";

        div.innerHTML = `
            <h3>${post.title}</h3>
            <p>${post.description}</p>
            <button onclick="claim('${post.donationId}')">Claim</button>
        `;

        container.appendChild(div);
    });
}

// ================= CLAIM =================
async function claim(donationId) {
    const userId = localStorage.getItem("userId");

    const res = await fetch(`${API_BASE_URL}/api/claim`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            donationId,
            userId
        })
    });

    const data = await res.json();

    if (res.ok) {
        alert("Claim successful ✅");
    } else {
        alert(data.message);
    }
}

// ================= LOGOUT =================
function logout() {
    localStorage.clear();
    window.location.href = "/Login";
}

// ================= INIT =================
loadPosts();
</script>

</body>
</html>
